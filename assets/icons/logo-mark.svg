<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="FC Mobile Cup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#07111f"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#1a3d32"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- mini cup -->
  <g fill="#facc15">
    <rect x="30" y="8" width="4" height="4" rx="1"/>
    <path d="M23 14h18v2.5c0 2.2-2 4-4.5 4h-9c-2.5 0-4.5-1.8-4.5-4V14z"/>
    <rect x="27" y="20.5" width="10" height="1.5" rx="0.75" opacity="0.9"/>
  </g>
  <!-- shuffle arrows -->
  <path d="M13 37c0-9 6.5-15 15-13" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <path d="M27 24l-4-1.5M27 24l-1 4" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M51 27c0 9-6.5 15-15 13" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <path d="M37 40l4 1.5M37 40l1-4" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- football -->
  <circle cx="32" cy="37" r="12.5" fill="url(#ball)" stroke="#4ade80" stroke-width="1.2"/>
  <polygon points="32,31.5 35.2,33.6 34.3,37.2 29.7,37.2 28.8,33.6" fill="#4ade80" opacity="0.9"/>
  <g stroke="rgba(255,255,255,0.28)" stroke-width="0.9" stroke-linecap="round">
    <line x1="32" y1="24.5" x2="32" y2="31.5"/>
    <line x1="38.5" y1="34" x2="35.2" y2="33.6"/>
    <line x1="36.5" y1="41" x2="34.3" y2="37.2"/>
    <line x1="27.5" y1="41" x2="29.7" y2="37.2"/>
    <line x1="25.5" y1="34" x2="28.8" y2="33.6"/>
  </g>
</svg>
