name = "fc-mobile-sync"
main = "sync-worker.js"
compatibility_date = "2024-06-01"

[vars]
GITHUB_OWNER = "luan20495"
GITHUB_REPO = "fc-mobile-team-random"
GITHUB_BRANCH = "main"

# Thiết lập secret (không commit token):
#   cd workers && npx wrangler secret put GITHUB_TOKEN
#   cd workers && npx wrangler secret put WRITE_KEY
#
# GITHUB_TOKEN: quyền Contents Read and write trên repo.
# WRITE_KEY: mã ghi dữ liệu (browser gửi header X-Sync-Key).
